<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-indigo-600 cursor-pointer" onclick="navigateTo('home')">MyBlog</h1>
      
      <div class="flex items-center gap-4">
        <button onclick="navigateTo('home')" class="hover:text-indigo-600">Главная</button>
        
        <div id="auth-buttons" class="flex items-center gap-3">
          <!-- JS заполнит кнопки -->
        </div>
      </div>
    </div>
  </nav>

  <!-- Главная страница -->
  <div id="home-page" class="max-w-6xl mx-auto px-6 py-8">
    <div class="flex justify-between items-center mb-8">
      <h2 class="text-3xl font-bold">Последние посты</h2>
      <button id="create-post-btn" onclick="showCreatePostModal()" 
              class="hidden bg-indigo-600 text-white px-5 py-2 rounded-lg hover:bg-indigo-700">
        <i class="fas fa-plus"></i> Новый пост
      </button>
    </div>

    <div id="posts-list" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Посты загружаются через JS -->
    </div>
  </div>

  <!-- Страница поста -->
  <div id="post-page" class="max-w-4xl mx-auto px-6 py-8 hidden">
    <button onclick="navigateTo('home')" class="text-indigo-600 mb-6 hover:underline">
      ← Назад к постам
    </button>
    <br>
        <button onclick="deletePost()" id="post-delete-button" class="text-indigo-600 mb-6 hover:underline">
      Удалить пост
    </button>
    <br>
        <button onclick="showCreatePostModal()" id="post-edit-button" class="text-indigo-600 mb-6 hover:underline">
      Редактировать пост
    </button>
    <div id="post-content"></div>
  </div>

  <!-- Модальное окно создания/редактирования поста -->
  <div id="post-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-8 w-full max-w-2xl">
      <h3 id="modal-title" class="text-2xl font-bold mb-6">Новый пост</h3>
      <input id="post-title" type="text" placeholder="Заголовок" 
             class="w-full p-3 border rounded-xl mb-4 focus:outline-none focus:border-indigo-500"/>
      <textarea id="post-body" rows="10" placeholder="Текст поста..." 
                class="w-full p-3 border rounded-xl mb-6 focus:outline-none focus:border-indigo-500"></textarea>
      <div class="flex justify-end gap-3">
        <button onclick="hidePostModal()" class="px-6 py-2 text-gray-600">Отмена</button>
        <button onclick="savePost()" id="save-post-btn"
                class="px-6 py-2 bg-indigo-600 text-white rounded-xl">Опубликовать</button>
      </div>
    </div>
  </div>

  <!-- Auth Modal -->
  <div id="auth-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-8 w-full max-w-md">
      <div class="flex justify-between mb-6">
        <button onclick="switchAuthTab(0)" id="tab-login" class="font-medium">Вход</button>
        <button onclick="switchAuthTab(1)" id="tab-register" class="font-medium text-gray-500">Регистрация</button>
      </div>
      
      <div id="login-form">
        <input id="login-email" type="email" placeholder="Email" class="w-full p-3 border rounded-xl mb-3"/>
        <input id="login-password" type="password" placeholder="Пароль" class="w-full p-3 border rounded-xl mb-6"/>
        <button onclick="login()" class="w-full bg-indigo-600 text-white py-3 rounded-xl">Войти</button>
      </div>

      <div id="register-form" class="hidden">
        <input id="reg-username" type="text" placeholder="Имя пользователя" class="w-full p-3 border rounded-xl mb-3"/>
        <input id="reg-email" type="email" placeholder="Email" class="w-full p-3 border rounded-xl mb-3"/>
        <input id="reg-password" type="password" placeholder="Пароль" class="w-full p-3 border rounded-xl mb-6"/>
        <button onclick="register()" class="w-full bg-indigo-600 text-white py-3 rounded-xl">Зарегистрироваться</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "http://35.180.71.148:6574"; // измените при необходимости
    let token = localStorage.getItem("token");
    let currentUser = null;
    let currentPostId = null;

    // ================== AUTH ==================
    function updateAuthUI() {
      const authDiv = document.getElementById("auth-buttons");
      if (token) {
        authDiv.innerHTML = `
          <span class="text-sm text-gray-600">${currentUser?.username || ''}</span>
          <button onclick="logout()" class="text-red-500 hover:text-red-600">Выйти</button>
        `;
        document.getElementById("create-post-btn").classList.remove("hidden");
      } else {
        authDiv.innerHTML = `
          <button onclick="showAuthModal()" class="text-indigo-600 hover:text-indigo-700">Войти</button>
        `;
        document.getElementById("create-post-btn").classList.add("hidden");
      }
    }

    async function register() {
      const username = document.getElementById("reg-username").value;
      const email = document.getElementById("reg-email").value;
      const password = document.getElementById("reg-password").value;

      const res = await fetch(`${API_BASE}/auth/register`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ username, email, password })
      });

      if (res.ok) alert("Регистрация успешна! Теперь войдите.");
      else alert("Ошибка регистрации");
    }

    async function login() {
      const email = document.getElementById("login-email").value;
      const password = document.getElementById("login-password").value;

      const res = await fetch(`${API_BASE}/auth/login`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ email, password })
      });

      if (res.ok) {
        const data = await res.json();
        token = data.token;
        localStorage.setItem("token", token);
        await getCurrentUser();
        hideAuthModal();
        updateAuthUI();
        loadPosts();
      } else {
        alert("Неверный email или пароль");
      }
    }

    async function getCurrentUser() {
      if (!token) return;
      const res = await fetch(`${API_BASE}/auth/me`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      if (res.ok) currentUser = await res.json();
    }

    function logout() {
      localStorage.removeItem("token");
      token = null;
      currentUser = null;
      updateAuthUI();
      navigateTo('home');
    }

    // ================== POSTS ==================
    async function loadPosts() {
      const res = await fetch(`${API_BASE}/posts`);
      const posts = await res.json();

      const container = document.getElementById("posts-list");
      container.innerHTML = posts.map(p => `
        <div onclick="openPost(${p.id})" class="bg-white rounded-2xl shadow hover:shadow-xl transition p-6 cursor-pointer">
          <h3 class="font-semibold text-xl mb-2">${p.title}</h3>
          <p class="text-gray-500 text-sm">Автор: ${p.author_username}</p>
          <p class="text-gray-400 text-xs mt-3">${new Date(p.created_at).toLocaleDateString('ru-RU')}</p>
        </div>
      `).join('');
    }

    async function openPost(id) {
      currentPostId = id;
      const res = await fetch(`${API_BASE}/posts/${id}`);
      const data = await res.json();

      document.getElementById("home-page").classList.add("hidden");
      document.getElementById("post-page").classList.remove("hidden");

      const comments = data.comments;

      if (currentUser?.id != data.user_id) {
        document.getElementById("post-delete-button").classList.add("hidden");
        document.getElementById("post-edit-button").classList.add("hidden");
      }

      document.getElementById("post-content").innerHTML = `
        <h1 class="text-4xl font-bold mb-4">${data.title}</h1>
        <div class="flex gap-4 text-sm text-gray-500 mb-8">
          <span>Автор: ${data.user_id === currentUser?.id ? 'Вы' : 'Пользователь'}</span>
          <span>${new Date(data.created_at).toLocaleDateString('ru-RU')}</span>
        </div>
        <div class="prose max-w-none mb-12">${data.body.replace(/\n/g, '<br>')}</div>

        <h3 class="text-2xl font-semibold mb-6">Комментарии (${comments.length})</h3>
        <div class="space-y-6 mb-10" id="comments-list">
          ${comments.map(c => `
            <div class="border-l-4 border-indigo-200 pl-4">
              <div class="flex justify-between">
                <b>${c.author_username}</b>
                <small class="text-gray-400">${new Date(c.created_at).toLocaleDateString('ru-RU')}</small>
              </div>
              <p class="mt-1">${c.body}</p>
            </div>
          `).join('')}
        </div>

        ${token ? `
        <div class="bg-gray-100 p-5 rounded-2xl">
          <textarea id="comment-body" class="w-full p-4 rounded-xl border" rows="3" placeholder="Напишите комментарий..."></textarea>
          <button onclick="addComment()" class="mt-3 bg-indigo-600 text-white px-6 py-2 rounded-xl">Отправить</button>
        </div>` : ''}
      `;
    }

    async function addComment() {
      const body = document.getElementById("comment-body").value.trim();
      if (!body) return;

      await fetch(`${API_BASE}/posts/${currentPostId}/comments`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({ body })
      });

      openPost(currentPostId); // перезагрузка
    }

    async function deletePost() {
      await fetch(`${API_BASE}/posts/${currentPostId}`, {
        method: "DELETE",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        }
      });

      navigateTo('home');
    }

    // ================== Create / Edit Post ==================
    function showCreatePostModal() {
      currentPostId = null;
      document.getElementById("modal-title").textContent = "Новый пост";
      document.getElementById("post-title").value = "";
      document.getElementById("post-body").value = "";
      document.getElementById("post-modal").classList.remove("hidden");
    }

    function hidePostModal() {
      document.getElementById("post-modal").classList.add("hidden");
    }

    async function savePost() {
      const title = document.getElementById("post-title").value.trim();
      const body = document.getElementById("post-body").value.trim();

      if (!title || !body) return alert("Заполните все поля");

      const url = currentPostId 
        ? `${API_BASE}/posts/${currentPostId}`
        : `${API_BASE}/posts`;

      const method = currentPostId ? "PATCH" : "POST";

      const res = await fetch(url, {
        method,
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({ title, body })
      });

      if (res.ok) {
        hidePostModal();
        loadPosts();
        if (currentPostId) openPost(currentPostId);
      } else {
        alert("Ошибка при сохранении");
      }
    }

    // ================== Utils ==================
    function navigateTo(page) {
      if (page === 'home') {
        document.getElementById("home-page").classList.remove("hidden");
        document.getElementById("post-page").classList.add("hidden");
        loadPosts();
      }
    }

    function showAuthModal() {
      document.getElementById("auth-modal").classList.remove("hidden");
      switchAuthTab(0);
    }

    function hideAuthModal() {
      document.getElementById("auth-modal").classList.add("hidden");
    }

    function switchAuthTab(tab) {
      document.getElementById("login-form").classList.toggle("hidden", tab === 1);
      document.getElementById("register-form").classList.toggle("hidden", tab === 0);
      
      document.getElementById("tab-login").classList.toggle("text-gray-500", tab === 1);
      document.getElementById("tab-register").classList.toggle("text-gray-500", tab === 0);
    }

    // Инициализация
    window.onload = async () => {
      if (token) await getCurrentUser();
      updateAuthUI();
      loadPosts();
    };
  </script>
</body>
</html>
